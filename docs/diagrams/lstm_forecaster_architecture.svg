<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b2d42"/>
    </marker>
    <style>
      .title{font:700 30px Arial; fill:#0b132b}
      .box{stroke:#1b263b; stroke-width:2; rx:14; ry:14}
      .txt{font:600 18px Arial; fill:#0b132b}
      .shape{font:500 15px Arial; fill:#1d3557}
      .small{font:500 14px Arial; fill:#3d5a80}
      .arrow{stroke:#2b2d42; stroke-width:2.5; fill:none; marker-end:url(#arrow)}
    </style>
  </defs>

  <text x="40" y="50" class="title">LSTMForecaster Architecture</text>

  <rect x="40" y="110" width="220" height="110" class="box" fill="#e3f2fd"/>
  <text x="58" y="152" class="txt">Input sequence</text>
  <text x="58" y="178" class="shape">x ∈ ℝ[B, T_in, d_in]</text>

  <rect x="300" y="90" width="250" height="150" class="box" fill="#e8f5e9"/>
  <text x="324" y="140" class="txt">Input projection</text>
  <text x="324" y="166" class="small">Linear(d_in → d_model)</text>
  <text x="324" y="191" class="small">+ LayerNorm</text>
  <text x="324" y="216" class="shape">→ h₀ ∈ ℝ[B, T_in, d_model]</text>

  <rect x="600" y="90" width="300" height="150" class="box" fill="#fff8e1"/>
  <text x="622" y="140" class="txt">Stacked residual LSTM encoder</text>
  <text x="622" y="166" class="small">for l = 1..N_enc:</text>
  <text x="622" y="191" class="small">h ← h + LSTM_l(LN(h))</text>
  <text x="622" y="216" class="shape">memory ∈ ℝ[B, T_in, d_model]</text>

  <rect x="960" y="90" width="360" height="150" class="box" fill="#fce4ec"/>
  <text x="980" y="140" class="txt">Decoder input initialization</text>
  <text x="980" y="166" class="small">Learned start token s ∈ ℝ[d_model]</text>
  <text x="980" y="191" class="small">repeat to horizon H</text>
  <text x="980" y="216" class="shape">dec₀ ∈ ℝ[B, H, d_model]</text>

  <rect x="420" y="330" width="360" height="160" class="box" fill="#ede7f6"/>
  <text x="442" y="380" class="txt">Stacked residual LSTM decoder</text>
  <text x="442" y="406" class="small">for l = 1..N_dec:</text>
  <text x="442" y="431" class="small">dec ← dec + LSTM_l(LN(dec), memory)</text>
  <text x="442" y="456" class="shape">dec ∈ ℝ[B, H, d_model]</text>

  <rect x="850" y="340" width="270" height="130" class="box" fill="#e0f7fa"/>
  <text x="875" y="386" class="txt">Output projection</text>
  <text x="875" y="411" class="small">Linear(d_model → d_z)</text>
  <text x="875" y="436" class="shape">ŷ ∈ ℝ[B, H, d_z]</text>

  <rect x="1160" y="340" width="180" height="130" class="box" fill="#f1f8e9"/>
  <text x="1185" y="392" class="txt">Forecast</text>
  <text x="1185" y="418" class="shape">H steps ahead</text>

  <path d="M260 165 L300 165" class="arrow"/>
  <path d="M550 165 L600 165" class="arrow"/>
  <path d="M900 165 L960 165" class="arrow"/>
  <path d="M1140 240 L1140 300 L780 300 L780 370" class="arrow"/>
  <path d="M720 240 L720 330" class="arrow"/>
  <path d="M780 410 L850 410" class="arrow"/>
  <path d="M1120 410 L1160 410" class="arrow"/>

  <text x="90" y="700" class="small">Key idea: encode observed history with residual LSTM encoder, then decode H future latents from learned start token and encoder memory.</text>
</svg>
